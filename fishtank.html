<h1>🐟 Mossy's Fish Tank</h1>

<p><b>Welcome to Mossy's home!</b></p>

<div class="tank">

    <img src="mossybowl.png" class="bowl">

    <img src="mossystare.png" class="mossy">

</div>

    <script>
const lines = [
    "I have counted 3.5 bubbles today.",
    "gravel is suspicious again.",
    "I think I saw movement. it was probably nothing.",
    "hello. I am emotionally processing water.",
    "someone blinked at me. I felt judged.",
    "I am watching everything. especially pebbles."
];

setInterval(() => {
    document.getElementById("mossySpeak").innerText =
        lines[Math.floor(Math.random() * lines.length)];
}, 4000);
</script>

<script>

const mossies = [
    "mossystare.png",
    "mossyleft.png",
    "mossyright.png",
    "mossytiltup.png",
    "mossypog.png",
    "mossynap.png"
];

const mossy = document.querySelector(".mossy");

const states = [

{
    img:"mossyleft.png",
    left:35,
    top:50
},

{
    img:"mossyright.png",
    left:67,
    top:52
},

{
    img:"mossystare.png",
    left:52,
    top:48
},

{
    img:"mossytiltup.png",
    left:60,
    top:38
},

{
    img:"mossypog.png",
    left:48,
    top:45
},

{
    img:"mossynap.png",
    left:45,
    top:60
}

];

function animateMossy(){

    const state = states[Math.floor(Math.random()*states.length)];

    mossy.src = state.img;

    mossy.style.left = state.left + "%";
    mossy.style.top = state.top + "%";

}

animateMossy();

setInterval(animateMossy,4000);

</script>
