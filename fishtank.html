<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<div class="sidebar">
    <h3>🐟 Mossy Menu</h3>

    <a href="index.html">🏠 Home</a>
    <a href="changelog.html">📜 Changelog</a>

<h1>🐟 Mossy's Fish Tank</h1>

<p><b>Welcome to Mossy's home!</b></p>

<div class="tank">

    <img src="mossybowl.png" class="bowl">

    <img src="mossystare.png" class="mossy">

</div>

<button onclick="feedMossy()">🍤 Feed Mossy</button>

<button onclick="petMossy()">🫧 Pet Mossy</button>

<button onclick="pokeMossy()">👉 Poke Mossy</button>

<p id="feedText"></p>

<h2 id="mood">Mood: Calm 🌊</h2>

<p id="mossySpeak"></p>

<script>

const mossy = document.querySelector(".mossy");

const moods = {

    calm:{
        name:"Calm 🌊",
        thoughts:[
            "The water feels nice today.",
            "Everything is peaceful.",
            "Just floating."
        ],
        poses:[
            {img:"mossystare.png",left:50,top:50},
            {img:"mossyleft.png",left:42,top:52},
            {img:"mossyright.png",left:58,top:48}
        ]
    },

    curious:{
        name:"Curious 👀",
        thoughts:[
            "Pebble detected.",
            "Something moved...",
            "Investigating..."
        ],
        poses:[
            {img:"mossypog.png",left:55,top:46},
            {img:"mossytiltup.png",left:62,top:38},
            {img:"mossystare.png",left:50,top:44}
        ]
    },

    hungry:{
        name:"Hungry 🍤",
        thoughts:[
            "Food?",
            "Where flakes.",
            "I require snacks."
        ],
        poses:[
            {img:"mossypog.png",left:52,top:49},
            {img:"mossyleft.png",left:40,top:47},
            {img:"mossyright.png",left:60,top:47}
        ]
    },

    sleepy:{
        name:"Sleepy 😴",
        thoughts:[
            "five more minutes...",
            "zzzz...",
            "too eepy..."
        ],
        poses:[
            {img:"mossynap.png",left:50,top:60},
            {img:"mossynap.png",left:48,top:58}
        ]
    },

    happy:{
        name:"Happy 🫧",
        thoughts:[
            "glub!!",
            "Today is a good fish day.",
            "I love bubbles."
        ],
        poses:[
            {img:"mossypog.png",left:50,top:48},
            {img:"mossytiltup.png",left:60,top:42},
            {img:"mossystare.png",left:45,top:46}
        ]
    }

};

let currentMood = "calm";

function chooseMood(){

    const keys = Object.keys(moods);

    currentMood = keys[Math.floor(Math.random()*keys.length)];

    document.getElementById("mood").innerText =
        "Mood: " + moods[currentMood].name;

}

function animateMossy(){

    const behaviour = moods[currentMood];

    const pose =
        behaviour.poses[
            Math.floor(Math.random()*behaviour.poses.length)
        ];

    mossy.src = pose.img;

    mossy.style.left = pose.left + "%";

    mossy.style.top = pose.top + "%";

    document.getElementById("mossySpeak").innerText =
        behaviour.thoughts[
            Math.floor(Math.random()*behaviour.thoughts.length)
        ];

}

chooseMood();

animateMossy();

setInterval(animateMossy,4000);

setInterval(() => {

    if (!isFed) {
        chooseMood();
    }

}, 20000);

    let isFed = false;

function pokeMossy(){

    const feedText = document.getElementById("feedText");

    const reactions = [

        "Mossy looks confused. 👀",
        "Mossy bonks your finger and swims away. 🐟",
        "Mossy stares directly into your soul.",
        "Mossy performs one dramatic spin.",
        "Mossy has decided you are suspicious."

    ];

    feedText.innerText =
        reactions[Math.floor(Math.random()*reactions.length)];

    animateMossy();

    setTimeout(() => {

        feedText.innerText = "";

    },4000);

}

function petMossy(){

    const feedText = document.getElementById("feedText");

    currentMood = "happy";

    document.getElementById("mood").innerText =
        "Mood: " + moods[currentMood].name;

    animateMossy();

    feedText.innerText =
        "Mossy happily wiggles around the bowl! 🫧💚";

    setTimeout(() => {

        feedText.innerText = "";

    },4000);

}

function feedMossy(){

    const feedText = document.getElementById("feedText");

    if(currentMood === "hungry"){

        isFed = true;
        currentMood = "happy";

        document.getElementById("mood").innerText =
            "Mood: " + moods[currentMood].name;

        animateMossy();

        feedText.innerText = "Mossy is VERY happy!! 🍤✨";

        setTimeout(() => {

            isFed = false;
            chooseMood();
            animateMossy();
            feedText.innerText = "";

        },8000);

    }else{

        feedText.innerText =
            "Mossy is not hungry... but appreciated the snack anyway 🐟";

        setTimeout(() => {

            feedText.innerText = "";

        },4000);

    }

}

</script>

    <img src="snail.png" id="snail">

<script>

const snail = document.getElementById("snail");

function snailVisit(){

    // Never appear under the sidebar
    const minX =
        window.innerWidth <= 768 ? 20 : 260;

    const maxX = window.innerWidth - 80;
    const maxY = window.innerHeight - 100;

    const x =
        Math.random() * (maxX - minX) + minX;

    const y =
        Math.random() * (maxY - 40) + 40;

    snail.style.left = x + "px";
    snail.style.top = y + "px";
    snail.style.opacity = "1";

    // disappear after 0.6-1.2 seconds
    setTimeout(() => {

        snail.style.opacity = "0";

    },600 + Math.random()*600);

}

// Small chance every 30 seconds
setInterval(() => {

    if(Math.random() < 0.35){

        snailVisit();

    }

},30000);

</script>
    
</body>

</html>
