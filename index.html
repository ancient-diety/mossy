<!DOCTYPE html>
<html>

<head>
    <title>Mossy's Fish Tank 🐟</title>

    <style>
        body {
            background-color: #d6f1ff; /* pale blue */
            color: #8aa0c6; /* darker text */
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            color: #2b3a67;
            text-shadow: 0 0 8px #a3c4ff;
        }

        button {
            background-color: #2b3a67;
            color: #d6f1ff;
            border: 2px solid #5a7dff;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
}

        button:hover {
            background-color: #716cff;
            border-color: #a3c4ff;
            box-shadow: 0 0 12px #a3c4ff;
            transform: scale(1.05);
}

    </style>
</head>

<body>

    <h1>Mossy's Fish Tank</h1>

    <p>Welcome to the aquarium!!</p>

    <button onclick="alert('glub glub 🐟')">Pat Mossy</button>

</body>

</html>
