<!DOCTYPE html>
<html>

<head>
    <title>Mossy's Fish Tank 🐟</title>

    <style>
        body {
            background-color: #d5cfff; /* pale blue */
            color: #6b4eff; /* darker text */
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            color: #7baeff; /* neon fish glow */
        }

        button {
            background-color: #2483cc;
            color: #b8aaff;
            border: #2483cc;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #716cff;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <h1>Mossy's Fish Tank</h1>
    <h3>🐟 Mossy is swimming</h3>

    <p>Welcome to the aquarium!!</p>

    <button onclick="alert('glub glub 🐟')">Pat Mossy</button>

</body>

</html>
