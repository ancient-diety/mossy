<!DOCTYPE html>
<html>

<head>
    <title>Mossy's Fish Tank 🐟</title>

    <style>
        body {
            background-color: #d6f1ff; /* pale blue */
            color: #5a7dff; /* darker text */
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            color: #5a7dff; /* neon fish glow */
        }

        button {
            background-color: #2b3a67;
            color: #b8aaff;

            padding: 10px 20px;
            border-radius: 12px;

            transition: 0.2s;

        button:hover {
            background-color: #716cff;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <h1>Mossy's Fish Tank</h1>

    <p>Welcome to the aquarium!!</p>

    <button onclick="alert('glub glub 🐟')">Pat Mossy</button>
